name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Rebuild every day so the build-time "today" advances. 18:30 UTC = 00:00 IST.
  schedule:
    - cron: "30 18 * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Build in India time so todayIso() (new Date() at build time) bakes the correct local date.
env:
  TZ: Asia/Kolkata

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install, build, and upload
        uses: withastro/action@v3
        with:
          node-version: 20

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
